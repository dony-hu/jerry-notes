name: Deploy Pages (Direct Upload)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version

      - name: Install dependencies
        run: npm install

      - name: Build site (jerry + irene)
        run: npm run build

      - name: Deploy Jerry site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_JERRY: ${{ vars.CF_PROJECT_JERRY }}
        run: |
          PROJECT_NAME=${CF_PROJECT_JERRY:-jerry-notes}
          npx wrangler pages deploy dist/jerry --project-name="$PROJECT_NAME" --branch=main

      - name: Deploy Irene site (optional)
        if: ${{ vars.CF_PROJECT_IRENED != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_PROJECT_IRENED: ${{ vars.CF_PROJECT_IRENED }}
        run: |
          npx wrangler pages deploy dist/irene --project-name="$CF_PROJECT_IRENED" --branch=main
