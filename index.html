<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jerry的个人站</title>
  <meta id="site-meta-description" name="description" content="记录想法、项目和日常笔记" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link id="site-favicon" rel="icon" type="image/svg+xml" href="./assets/mouse-favicon.svg" />
  <link rel="stylesheet" href="./styles.css?v=202603220812" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <img id="site-banner" class="header-banner" src="./assets/cat-mouse-banner.svg?v=202603212115" alt="卡通风格猫追老鼠横幅插画（原创）" />
      <div class="site-title-row">
        <div class="site-identity">
          <span id="site-kicker" class="site-kicker">PUBLIC + INTERNAL NOTES</span>
          <h1 id="site-title">Jerry的个人站</h1>
          <p id="site-hero-description">公开记录产品、项目与日常思考；登录后可查看内部工作手册、学习资料与阶段性复盘。</p>
        </div>
        <div class="site-actions">
          <div class="utility-bar">
            <div class="auth-controls">
              <div class="auth-row">
                <a id="login-btn" class="btn btn-small btn-feishu hidden" href="/api/auth/feishu/login">
                  <span class="feishu-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="presentation" focusable="false">
                      <path fill="#00C2FF" d="M7.4 3.2c2.8 0 4.4 1.5 4.4 4.2v1H9.7c-2.3 0-3.9-1.5-3.9-3.7 0-1 .3-1.7 1.1-1.5h.5z"/>
                      <path fill="#14CF8E" d="M16.8 5.3c1.1 0 1.8.7 1.8 1.9 0 2.8-2.1 4.8-5.3 4.8h-1.5V9.9c0-2.8 2-4.6 4.8-4.6h.2z"/>
                      <path fill="#0B5CFF" d="M9.2 11.3c1.6 0 2.8.8 2.8 2.4V18H9.8c-3 0-4.9-1.7-4.9-4 0-1.7 1.5-2.7 4.1-2.7h.2z"/>
                      <path fill="#0F866C" d="M17.4 11.8c1 0 1.7.7 1.7 1.8 0 4-2.4 7.1-6 7.1h-1.3v-3c0-3.5 2.1-5.9 5.4-5.9h.2z"/>
                    </svg>
                  </span>
                  <span>飞书登录</span>
                </a>
                <div id="user-session" class="user-session hidden">
                  <img id="user-avatar" class="user-avatar hidden" alt="飞书头像" />
                  <div class="user-meta">
                    <strong id="user-name">飞书用户</strong>
                  </div>
                  <button id="logout-btn" class="btn btn-small" type="button">退出</button>
                </div>
              </div>
              <div id="auth-note" class="auth-note hidden" aria-live="polite"></div>
            </div>
            <button id="theme-toggle" class="btn btn-small theme-toggle-icon" type="button" aria-label="切换主题" title="切换主题">
              <span class="theme-icon" aria-hidden="true">🌙</span>
            </button>
          </div>
        </div>
      </div>
      <nav class="site-nav">
        <a href="#posts">文章</a>
        <a href="#about">关于</a>
      </nav>
    </div>
  </header>

  <main class="container main-layout">
    <section class="content-column">
      <section id="posts" class="card">
        <div class="section-heading">
          <div>
            <span class="section-kicker">Knowledge Feed</span>
            <h2>最近更新</h2>
          </div>
          <p>从公开文章到内部手册，按时间浏览最近沉淀下来的内容。</p>
        </div>
        <ul id="post-list" class="post-list"></ul>
      </section>

      <section id="viewer" class="card hidden">
        <div class="viewer-toolbar">
          <div class="viewer-toolbar-left">
            <button id="back-btn" class="btn">← 返回列表</button>
          </div>
          <div class="viewer-toolbar-right">
            <details class="viewer-actions-menu">
              <summary class="btn btn-small viewer-actions-trigger">更多操作</summary>
              <div class="viewer-actions-popover">
                <button id="export-pdf-btn" class="btn btn-small viewer-action-btn" type="button">导出 PDF</button>
                <button id="wechat-btn" class="btn btn-small viewer-action-btn" type="button">公众号稿</button>
                <button id="summary-btn" class="btn btn-small viewer-action-btn" type="button">3条摘要</button>
              </div>
            </details>
          </div>
        </div>
        <article id="post-content" class="markdown-body"></article>
      </section>

      <section id="about" class="card">
        <div class="section-heading">
          <div>
            <span class="section-kicker">About This Site</span>
            <h2>关于我</h2>
          </div>
        </div>
        <p id="about-copy">这里长期记录产品、项目、行业理解和日常思考。公开内容偏方法、观点和案例；登录后可继续查看内部工作手册、学习资料与阶段性复盘。</p>
      </section>
    </section>

    <aside id="index-panel" class="index-panel">
      <div class="index-panel-head">
        <div class="filter-title">索引筛选</div>
        <button id="filter-toggle" class="btn btn-small filter-toggle-btn" type="button" aria-expanded="true">收起</button>
      </div>

      <div class="index-panel-body" id="index-panel-body">
        <button id="reset-filter" class="btn btn-small" type="button">重置筛选</button>

        <h3>按主题标签</h3>
        <div id="tag-filter" class="chips"></div>
        <button id="tag-more" class="btn btn-small tag-more-btn hidden" type="button">展开更多</button>

        <h3>按年月</h3>
        <select id="month-filter" class="month-select" aria-label="按年月筛选"></select>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <div class="container">© <span id="year"></span> <span id="site-footer-text">我的个人站</span></div>
  </footer>

  <script type="module" src="./site-shell.mjs"></script>
  <script type="module" src="./app.js?v=202603220812"></script>
</body>
</html>
